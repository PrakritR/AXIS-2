<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Axis</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #080b14;
        color: #e6ecff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 24px;
        text-align: center;
        box-sizing: border-box;
      }
      .logo {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: linear-gradient(135deg, #bcd4ff, #2f6bff);
      }
      h1 {
        font-size: 20px;
        margin: 4px 0 0;
        font-weight: 600;
      }
      p {
        margin: 0;
        max-width: 320px;
        color: #9fb0d6;
        line-height: 1.5;
      }
      button {
        margin-top: 8px;
        padding: 12px 22px;
        border: 0;
        border-radius: 12px;
        background: #2f6bff;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo"></div>
      <h1>You're offline</h1>
      <p>Axis needs an internet connection. Check your connection and try again.</p>
      <button onclick="window.location.reload()">Retry</button>
    </div>
  </body>
</html>
